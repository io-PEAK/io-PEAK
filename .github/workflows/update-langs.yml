name: Update Language Stats Card

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC
  workflow_dispatch:        # lets you trigger manually from Actions tab
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate langs card
        uses: ./.github/actions/langs-card
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          github_username: io-PEAK
          output_path: assets/langs-card.svg
          top_n: 8

      - name: Commit & push
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/langs-card.svg
          git diff --cached --quiet || git commit -m "chore: update langs card [skip ci]"
          git push
